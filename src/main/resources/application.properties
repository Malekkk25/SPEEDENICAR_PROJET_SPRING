spring.application.name=SPEEDENICAR_PROJET
server.port=8088

# --- CONFIGURATION POSTGRESQL ---
spring.datasource.url=jdbc:postgresql://localhost:5432/speedenicarthage
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# Optimisation HikariCP pour PostgreSQL
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# --- JPA / HIBERNATE ---
spring.jpa.hibernate.ddl-auto=update
# Utilisation du dialecte PostgreSQL standard
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_batch_fetch_size=16
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Suppression de la ligne preferred_instant_jdbc_type=VARCHAR (Postgres gčre nativement le TIMESTAMP)
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# --- MULTIPART / UPLOAD ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# --- JACKSON ---
spring.jackson.default-property-inclusion=non_null

# --- JWT ---
app.jwt.secret=${JWT_SECRET:dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBzcGVlZCBhcHBsaWNhdGlvbiBqd3QgdG9rZW4gZ2VuZXJhdGlvbg==}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# --- UPLOAD STORAGE ---
speed.file.upload-dir=./uploads
speed.file.allowed-types=application/pdf,image/png,image/jpeg,image/jpg

# --- SWAGGER / OPENAPI ---
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method

# --- LOGGING ---
logging.level.root=INFO
logging.level.tn.enicarthage=DEBUG
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# --- SPRING MAIL ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=malek.ayed@enicar.ucar.tn
spring.mail.password=rfnf mjfh maln vrpl
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
