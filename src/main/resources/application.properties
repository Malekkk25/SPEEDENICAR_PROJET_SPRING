spring.application.name=SPEEDENICAR_PROJET
server.port=8081
# ?? Datasource (SQLite) ?????????????????????????????????????
spring.datasource.url=jdbc:sqlite:speed_db.sqlite
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.minimum-idle=1

# ?? JPA / Hibernate ??????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_batch_fetch_size=16
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.type.preferred_instant_jdbc_type=VARCHAR
spring.datasource.hikari.connection-init-sql=PRAGMA journal_mode=WAL;
spring.jpa.properties.hibernate.dialect=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
# ?? Multipart / Upload ??????????????????????????????????????
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
# ?? Jackson ??????????????????????????????????????????????????


spring.jackson.default-property-inclusion=non_null

# ?? JWT ??????????????????????????????????????????????????????
speed.jwt.secret=${JWT_SECRET:dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBzcGVlZCBhcHBsaWNhdGlvbiBqd3QgdG9rZW4gZ2VuZXJhdGlvbg==}
speed.jwt.access-token-expiration-ms=3153600000000
speed.jwt.refresh-token-expiration-ms=3153600000000

# ?? Upload storage ???????????????????????????????????????????
speed.file.upload-dir=./uploads
speed.file.allowed-types=application/pdf,image/png,image/jpeg,image/jpg

# ?? Swagger / OpenAPI ????????????????????????????????????????
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method

# ?? Logging ??????????????????????????????????????????????????
logging.level.root=INFO
logging.level.com.speed=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
